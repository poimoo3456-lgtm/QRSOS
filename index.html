<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Report Plus | ระบบแจ้งเหตุสำหรับกู้ภัย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .rescue-gradient {
            background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%);
        }
        .image-preview-box {
            display: none;
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 12px;
            margin-top: 10px;
            background: #f1f5f9;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="rescue-gradient text-white py-2 px-4 text-center text-xs font-bold tracking-widest uppercase shadow-md">
        Emergency Rescue Network - 24/7 Monitoring
    </div>

    <div class="max-w-md mx-auto p-4">
        <!-- Brand -->
        <div class="text-center my-6">
            <h1 class="text-3xl font-extrabold text-red-800">ศูนย์รับแจ้งเหตุ</h1>
            <p class="text-gray-600 text-sm">แจ้งเหตุฉุกเฉิน / อุบัติเหตุ / ขอความช่วยเหลือ</p>
        </div>

        <!-- Main Form -->
        <div id="formSection" class="bg-white rounded-3xl shadow-xl p-6 border border-gray-200">
            <form id="rescueForm" class="space-y-4">
                
                <!-- Reporter Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ชื่อผู้แจ้งเหตุ</label>
                    <input type="text" id="reporterName" required 
                        class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-red-500 focus:bg-white outline-none transition-all"
                        placeholder="ระบุชื่อ-นามสกุล">
                </div>

                <!-- Incident Type -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ประเภทเหตุ</label>
                    <select id="reportType" required
                        class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-red-500 focus:bg-white outline-none transition-all">
                        <option value="">-- เลือกประเภทเหตุ --</option>
                        <option value="🚑 อุบัติเหตุทางถนน">อุบัติเหตุทางถนน</option>
                        <option value="🔥 อัคคีภัย/ไฟไหม้">อัคคีภัย/ไฟไหม้</option>
                        <option value="🩺 เจ็บป่วยฉุกเฉิน">เจ็บป่วยฉุกเฉิน</option>
                        <option value="🐍 สัตว์ร้าย/งูเข้าบ้าน">สัตว์ร้าย/งูเข้าบ้าน</option>
                        <option value="🆘 ขอความช่วยเหลืออื่นๆ">ขอความช่วยเหลืออื่นๆ</option>
                    </select>
                </div>

                <!-- Photo Upload Section -->
                <div class="bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-300">
                    <label class="block text-sm font-bold text-slate-700 mb-2">📸 รูปภาพประกอบเหตุการณ์</label>
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('photoInput').click()"
                        class="w-full bg-white text-red-700 py-3 rounded-lg border border-red-100 shadow-sm flex items-center justify-center space-x-2 font-semibold hover:bg-red-50 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span>ถ่ายรูปเหตุการณ์</span>
                    </button>
                    <img id="imagePreview" class="image-preview-box" src="#">
                </div>

                <!-- Location -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">สถานที่ / จุดสังเกต</label>
                    <textarea id="location" required rows="2"
                        class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-red-500 focus:bg-white outline-none transition-all"
                        placeholder="เช่น หน้าวัด..., ซอย..., กิโลเมตรที่..."></textarea>
                    
                    <button type="button" id="getGPS" 
                        class="mt-2 w-full text-xs flex items-center justify-center space-x-1 text-blue-700 font-bold py-2 bg-blue-50 rounded-lg hover:bg-blue-100 transition">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                        <span id="gpsStatus">แตะเพื่อระบุพิกัด GPS อัตโนมัติ</span>
                    </button>
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">เบอร์โทรศัพท์ติดต่อกลับ</label>
                    <input type="tel" id="contactNumber" required 
                        class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-red-500 focus:bg-white outline-none transition-all"
                        placeholder="0XX-XXXXXXX">
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn"
                    class="w-full rescue-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all text-xl mt-4">
                    ส่งข้อมูลแจ้งกู้ภัย
                </button>
            </form>
        </div>

        <!-- Success Message -->
        <div id="resultSection" class="hidden bg-white rounded-3xl shadow-xl p-10 text-center border-t-8 border-green-600 mt-4">
            <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">ส่งข้อมูลแจ้งเหตุสำเร็จ</h2>
            <p class="text-gray-600">เจ้าหน้าที่ได้รับข้อมูลและภาพถ่ายแล้ว<br><span class="text-red-600 font-bold">โปรดรอรับสายโทรศัพท์</span></p>
            <button onclick="window.location.reload()" class="mt-8 text-slate-500 font-medium hover:text-red-600 underline">แจ้งเหตุใหม่เพิ่มเติม</button>
        </div>
        
        <p class="text-center text-[10px] text-slate-400 mt-8">RESCUE SYSTEM v2.1 | POWERED BY TELEGRAM API</p>
    </div>

    <script>
        // Updated API Token
        const BOT_TOKEN = "8732929782:AAEFZMGYW4oUvssPejul92U6z7qKKga96bE";
        const CHAT_ID = "7967010433";
        let gpsCoords = "ไม่ได้รับพิกัด";
        let selectedFile = null;

        // Image Preview
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // GPS Function
        document.getElementById('getGPS').addEventListener('click', function() {
            const statusText = document.getElementById('gpsStatus');
            if (navigator.geolocation) {
                statusText.innerText = "กำลังเข้าถึงพิกัด...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsCoords = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    statusText.innerText = "บันทึกพิกัด GPS สำเร็จ ✓";
                    statusText.parentElement.classList.replace('text-blue-700', 'text-green-700');
                    statusText.parentElement.classList.replace('bg-blue-50', 'bg-green-50');
                }, () => { 
                    statusText.innerText = "เข้าถึงพิกัดไม่ได้ (โปรดเปิด GPS)"; 
                    statusText.parentElement.classList.replace('text-blue-700', 'text-red-700');
                });
            }
        });

        // Submission
        document.getElementById('rescueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "กำลังส่งข้อมูลแจ้งเหตุ...";

            const name = document.getElementById('reporterName').value;
            const type = document.getElementById('reportType').value;
            const loc = document.getElementById('location').value;
            const phone = document.getElementById('contactNumber').value;

            const caption = `🚨 *มีการแจ้งเหตุใหม่ (กู้ภัย)*\n` +
                            `━━━━━━━━━━━━━━\n` +
                            `👤 *ผู้แจ้ง:* ${name}\n` +
                            `⚠️ *ประเภทเหตุ:* ${type}\n` +
                            `📍 *สถานที่:* ${loc}\n` +
                            `📞 *เบอร์โทร:* \`${phone}\`\n` +
                            `🗺️ *พิกัด GPS:* [คลิกเพื่อนำทาง](${gpsCoords})\n` +
                            `━━━━━━━━━━━━━━\n` +
                            `⏰ *แจ้งเมื่อ:* ${new Date().toLocaleString('th-TH')}`;

            try {
                if (selectedFile) {
                    // Send as Photo
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', selectedFile);
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    if(!response.ok) throw new Error();
                } else {
                    // Send as Text only
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: caption,
                            parse_mode: 'Markdown'
                        })
                    });
                    if(!response.ok) throw new Error();
                }

                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('resultSection').classList.remove('hidden');
                window.scrollTo(0, 0);

            } catch (error) {
                alert("เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาโทรสายด่วน 1669");
                btn.disabled = false;
                btn.innerText = "ส่งข้อมูลแจ้งกู้ภัย";
            }
        });
    </script>
</body>
</html>
