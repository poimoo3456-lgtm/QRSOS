<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Report Plus | ระบบแจ้งเหตุพร้อมภาพถ่าย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .rescue-gradient {
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
        }
        .image-preview-box {
            display: none;
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Header Status Bar -->
    <div class="rescue-gradient text-white py-2 px-4 text-center text-xs font-bold tracking-widest uppercase">
        Emergency Rescue Network - 24 Hours
    </div>

    <div class="max-w-md mx-auto p-4">
        <!-- Brand -->
        <div class="text-center my-6">
            <h1 class="text-3xl font-extrabold text-red-700">แจ้งเหตุฉุกเฉิน</h1>
            <p class="text-gray-500 text-sm">ข้อมูลของท่านจะถูกส่งไปยังศูนย์รับแจ้งเหตุโดยตรง</p>
        </div>

        <!-- Main Form -->
        <div id="formSection" class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100">
            <form id="rescueForm" class="space-y-4">
                
                <!-- Reporter Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ชื่อผู้แจ้ง</label>
                    <input type="text" id="reporterName" required 
                        class="w-full bg-gray-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-red-500 outline-none"
                        placeholder="ระบุชื่อของคุณ">
                </div>

                <!-- Incident Type -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ประเภทเหตุ</label>
                    <select id="reportType" required
                        class="w-full bg-gray-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-red-500 outline-none">
                        <option value="">-- เลือกประเภทเหตุ --</option>
                        <option value="🚑 อุบัติเหตุทางถนน">อุบัติเหตุทางถนน</option>
                        <option value="🔥 เพลิงไหม้">เพลิงไหม้</option>
                        <option value="🩺 ผู้ป่วยฉุกเฉิน">ผู้ป่วยฉุกเฉิน</option>
                        <option value="🐍 สัตว์ร้าย/สิ่งของอันตราย">สัตว์ร้าย/สิ่งของอันตราย</option>
                        <option value="🆘 อื่นๆ">อื่นๆ</option>
                    </select>
                </div>

                <!-- Photo Upload Section -->
                <div class="bg-red-50 p-4 rounded-xl border-2 border-dashed border-red-200">
                    <label class="block text-sm font-bold text-red-700 mb-2">📸 ถ่ายรูปหรือแนบภาพเหตุการณ์</label>
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('photoInput').click()"
                        class="w-full bg-white text-red-600 py-3 rounded-lg border border-red-200 shadow-sm flex items-center justify-center space-x-2 font-semibold">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span>ถ่ายภาพ / เลือกรูป</span>
                    </button>
                    <img id="imagePreview" class="image-preview-box" src="#">
                </div>

                <!-- Location -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">สถานที่เกิดเหตุ</label>
                    <textarea id="location" required rows="2"
                        class="w-full bg-gray-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-red-500 outline-none"
                        placeholder="ระบุจุดสังเกตหรือที่อยู่ที่ชัดเจน"></textarea>
                    
                    <button type="button" id="getGPS" 
                        class="mt-2 w-full text-xs flex items-center justify-center space-x-1 text-blue-600 font-bold py-1 px-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                        <span id="gpsStatus">แตะเพื่อระบุพิกัด GPS</span>
                    </button>
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">เบอร์ติดต่อกลับ</label>
                    <input type="tel" id="contactNumber" required 
                        class="w-full bg-gray-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-red-500 outline-none"
                        placeholder="0XX-XXXXXXX">
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn"
                    class="w-full rescue-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 transform transition active:scale-95 text-lg">
                    แจ้งเหตุทันที
                </button>
            </form>
        </div>

        <!-- Success Message -->
        <div id="resultSection" class="hidden bg-white rounded-3xl shadow-xl p-10 text-center border-t-8 border-green-500">
            <div class="text-green-500 text-6xl mb-4">✓</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">ส่งข้อมูลสำเร็จ</h2>
            <p class="text-gray-600">เจ้าหน้าที่กำลังดำเนินการ<br>โปรดรอรับโทรศัพท์</p>
            <button onclick="window.location.reload()" class="mt-6 text-red-600 font-bold">แจ้งเหตุอื่นเพิ่มเติม</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8732929782:AAGtaP6SYO5KDnhhYAU1yh55dUao--G96Z4";
        const CHAT_ID = "7967010433";
        let gpsCoords = "ไม่ได้รับพิกัด";
        let selectedFile = null;

        // Image Preview Handler
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // GPS Handler
        document.getElementById('getGPS').addEventListener('click', function() {
            const statusText = document.getElementById('gpsStatus');
            if (navigator.geolocation) {
                statusText.innerText = "กำลังค้นหาพิกัด...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsCoords = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    statusText.innerText = "บันทึกพิกัด GPS สำเร็จ ✓";
                    statusText.parentElement.classList.replace('text-blue-600', 'text-green-600');
                }, () => { statusText.innerText = "เข้าถึงพิกัดไม่ได้"; });
            }
        });

        // Form Submission
        document.getElementById('rescueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "กำลังส่งข้อมูลและภาพ...";

            const name = document.getElementById('reporterName').value;
            const type = document.getElementById('reportType').value;
            const loc = document.getElementById('location').value;
            const phone = document.getElementById('contactNumber').value;

            const caption = `🚨 *แจ้งเหตุฉุกเฉิน (กู้ภัย)*\n` +
                            `━━━━━━━━━━━━━━\n` +
                            `👤 ผู้แจ้ง: ${name}\n` +
                            `⚠️ เหตุ: ${type}\n` +
                            `📍 สถานที่: ${loc}\n` +
                            `📞 โทร: ${phone}\n` +
                            `🗺️ พิกัด: [กดเพื่อนำทาง](${gpsCoords})\n` +
                            `━━━━━━━━━━━━━━`;

            try {
                if (selectedFile) {
                    // ส่งรูปภาพพร้อมข้อความ
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', selectedFile);
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    // ส่งแค่ข้อความ (ถ้าไม่ได้เลือกรูป)
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: caption,
                            parse_mode: 'Markdown'
                        })
                    });
                }

                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('resultSection').classList.remove('hidden');
            } catch (error) {
                alert("การส่งข้อมูลล้มเหลว กรุณาติดต่อสายด่วน 1669");
                btn.disabled = false;
                btn.innerText = "แจ้งเหตุทันที";
            }
        });
    </script>
</body>
</html>
